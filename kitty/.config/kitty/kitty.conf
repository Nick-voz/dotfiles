font_size 16.0
initial_window_width 100c
initial_window_height 30c
window_padding_width 5
copy_on_select yes
cursor_shape underline
term xterm-256color
allow_remote_control yes
shell_integration enabled
confirm_os_window_close 0

map ctrl+backspace send_text all \x15
map cmd+backspace send_text all \x15
map ctrl+minus change_font_size all -2.0
map shift+page_up scroll_page_up
map shift+page_down scroll_page_down
map shift+home scroll_home
map shift+end scroll_end
map ctrl+page_up previous_tab
map ctrl+page_down next_tab
map ctrl+shift+v paste_from_clipboard
map meta+shift+v paste_from_selection
map ctrl+left send_text all \x01
map ctrl+right send_text all \x05
map cmd+left send_text all \x01
map cmd+right send_text all \x05
map cmd+d send_text all \x04
map cmd+l send_text all \x0c
map cmd+enter noop
map cmd+enter new_tab
map cmd+w kitten close_tab_if_multi.py
