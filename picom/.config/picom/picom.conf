# nhadows
shadow = true;
shadow-radius = 25;
shadow-opacity = 0.4;
shadow-offset-x = 5;
shadow-offset-y = 5;
shadow-exclude = [
  "class_g = 'dontstarve_steam_x64'"
];

inactive-opacity = 0.9;
frame-opacity = 0;
popup_menu = { opacity = 0.8; }
dropdown_menu = { opacity = 0.8; }
inactive-opacity-override = false;
active-opacity = 1.0;
inactive-dim = 0.2;

opacity-rule = [
  # "100:class_g     = 'Bar'",             # lemonbar
  # "100:class_g    = 'slop'",            # maim
  # "100:class_g    = 'XTerm'",
  # "100:class_g    = 'URxvt'",
  # "100:class_g    = 'kitty'",
  # "100:class_g    = 'kitty'",
  # "100:class_g     = 'Polybar'",
  # "100:class_g    = 'code-oss'",
  # "100:class_g    = 'Meld'",
  # "100:class_g     = 'TelegramDesktop'",
  # "100:class_g     = 'jetbrains-clion'",
  # "100:class_g     = 'discord'",
  # "90:class_g     = 'Joplin'",
  # "100:class_g    = 'firefox'",
  # "100:class_g    = 'Thunderbird'",
  "100:class_g    = 'steam'",
  "100:class_g    = 'dontstarve_steam_x64'",
  # "80:class_g    = 'Rofi'",
  # "80:class_g    = 'btop'"
  # # "00:class_g    = 'awesom"
];

blur: {
  method = "dual_kawase";
  strength = 4;
  deviation = 0.0;
  kernel = "11x11gaussian";
  background = false;
  background-frame = false;
  background-fixed = false;
  kern = "3x3box";
}


backend = "glx";
vsync = true
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
unredir-if-possible = true
detect-transient = true
detect-client-leader = true
use-damage = false
log-level = "info";
wintypes:
{
  normal = { fade = false; shadow=true}
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.7; }
  dropdown_menu = { opacity = 0.8; }
};
