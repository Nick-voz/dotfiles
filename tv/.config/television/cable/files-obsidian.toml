[metadata]
name = "files-obsidian"
description = "A channel to select obsidian files and directories"
requirements = ["fd", "bat"]

[source]
command = ["fd -t f --full-path $HOME/obsidian/base/"]

[preview]
command = "bat -n --color=always '{}'"
env = { BAT_THEME = "ansi" }

[keybindings]
shortcut = "f1"
f12 = "actions:edit"
enter = "actions:edit"

[actions.edit]
description = "Opens the selected entries with the default editor (falls back to vim)"
command = "nohup $TERMINAL $EDITOR '{}' >/dev/null 2>&1 & exit"
mode = "execute"
[actions.goto_parent_dir]
description = "Re-opens tv in the parent directory"
command = "tv files .."
mode = "execute"
