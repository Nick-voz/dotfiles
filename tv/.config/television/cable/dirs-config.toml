[metadata]
name = "dirs-config"
description = "A channel to select from config directories"
requirements = ["fd"]

[source]
command = [
  "find $HOME/.config $HOME/.bashrc $HOME/.zshrc $HOME/.Xresources -maxdepth 1 2>/dev/null",
]

[preview]
command = "ls -la --color=always '{}'"

[keybindings]
shortcut = "f2"
enter = "actions:open"

[actions.open]
description = "Open selected config with editor"
command = "nohup $TERMINAL $EDITOR '{}' >/dev/null 2>&1 & exit"
mode = "execute"
